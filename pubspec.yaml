name: pet
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.0+1

environment:
  sdk: ^3.10.0


dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get_it: ^9.2.1
  injectable: ^2.7.1+4
  injectable_generator: ^2.12.1
  build_runner: ^2.12.2
  firebase_core: ^4.5.0
  cloud_firestore: ^6.1.3
  firebase_database: ^12.1.4
  firebase_storage: ^13.1.0
  flutter_bloc: ^9.1.1
  go_router: ^17.1.0
  top_snackbar_flutter: ^3.3.0
  intl: ^0.20.2
  firebase_auth: ^6.2.0
  google_sign_in: ^7.2.0
  logger: ^2.6.2
  shared_preferences: ^2.5.4
  freezed: ^3.2.5
