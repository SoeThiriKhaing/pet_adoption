name: Flutter CI/CD

on:
  push:
    branches: [ main ] # main branch ထဲ push လုပ်ရင် run မယ်
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # ဒီ line ကို ထည့်ပေးပါ

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2.12.0
        with:
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

#      - name: Run Tests
#        run: flutter test

      - name: Build APK
        run: flutter build apk --release
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk